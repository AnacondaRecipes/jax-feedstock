{% set name = "jax" %}
{% set version = "0.7.2" %}

package:
  name: {{name}}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/j/jax/jax-{{ version }}.tar.gz
  sha256: 71a42b964bc6d52e819311429e6c0f5742e2a4650226dab1a1dd26fd986ca70d

build:
  number: 0
  skip: true  # [py<311]
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vv

requirements:
  host:
    - python
    - pip
    - wheel
    - setuptools
  run:
    - python
    - numpy >=2.0
    - opt_einsum
    - scipy >=1.13
    - importlib_metadata >=4.6
    - ml_dtypes >=0.5.0
    - jaxlib {{ version }}
  run_constrained:
    # Change to nvidia-cudnn-* in https://github.com/jax-ml/jax/blob/main/jax_plugins/cuda/plugin_setup.py
    - cudnn >=9.8,<10.0

test:
  requires:
    - pip
  imports:
    - jax
    - jax._src
  commands:
    - pip check

about:
  home: https://github.com/jax-ml/jax
  license: Apache-2.0
  license_family: APACHE
  license_file: LICENSE
  summary: Differentiate, compile, and transform Numpy code
  description: |
    JAX is Autograd and XLA, brought together for high-performance numerical computing and machine learning research.
    It provides composable transformations of Python+NumPy programs: differentiate, vectorize, parallelize, Just-In-Time compile to GPU/TPU, and more.
  dev_url: https://github.com/jax-ml/jax
  doc_url: https://docs.jax.dev/en/latest/

extra:
  recipe-maintainers:
    - ocefpaf
    - ericmjl
